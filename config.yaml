subscriptions:
  schema_migration:
    stage: A
    diff_threshold_pct: 15
  keyword_recall_mode: or
  intent_profiles:
    - tag: 持续学习
      description: 查找关于持续学习（Continual Learning）的研究文章
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: continual learning
          keyword_cn: 持续学习
          query: research papers on continual learning in machine learning
        - keyword: incremental learning
          keyword_cn: 增量学习
          query: advancements in incremental learning algorithms
        - keyword: catastrophic forgetting
          keyword_cn: 灾难性遗忘
          query: mitigating catastrophic forgetting in neural networks
        - keyword: task-incremental learning
          keyword_cn: 任务增量学习
          query: benchmarks and methods for task-incremental learning
        - keyword: class-incremental learning
          keyword_cn: 类增量学习
          query: challenges in class-incremental learning scenarios
      intent_queries:
        - query: state of the art methods in continual learning
          query_cn: 持续学习领域的最先进方法
          enabled: true
          source: manual
          note: ''
        - query: survey of catastrophic forgetting solutions in deep learning
          query_cn: 深度学习中灾难性遗忘解决方案的综述
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-04-13T15:59:59.291Z'
